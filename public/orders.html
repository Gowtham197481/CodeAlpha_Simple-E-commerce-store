<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Orders | CodeAlpha</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="guard.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <header>
        <nav>
            <div class="logo">CodeAlpha</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="orders.html" class="active">My Orders</a></li>
            </ul>
        </nav>
    </header>

    <main class="orders-container">
        <h1>Track Your <span>Orders</span></h1>
        <p>Stay updated on your premium purchases.</p>

        <div id="orders-list">
            <!-- Orders will be loaded here -->
            <div class="no-orders" style="text-align: center; padding: 4rem;">
                <i data-lucide="package" size="48" style="color: #eee; margin-bottom: 1rem;"></i>
                <p>You haven't placed any orders yet.</p>
                <a href="shop.html" class="btn-primary"
                    style="display: inline-block; margin-top: 1rem; text-decoration: none;">Explore Shop</a>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const ordersList = document.getElementById('orders-list');
            const user = JSON.parse(localStorage.getItem('user')) || null;

            let orders = [];

            try {
                // Try fetching from the database first
                const userIdParam = user ? user.id : '';
                const res = await fetch(`/api/orders/${userIdParam}`);
                if (res.ok) {
                    const dbOrders = await res.json();
                    // Transform DB orders to match the UI format
                    orders = dbOrders.map(o => ({
                        id: o.orderNumber,
                        date: new Date(o.createdAt).toLocaleDateString(),
                        deliveryDate: o.deliveryDate,
                        status: o.status,
                        total: `$${o.totalPrice.toFixed(2)}`,
                        items: o.OrderItems || [],
                        address: { name: o.shippingName }
                    }));
                }
            } catch (err) {
                console.error('Failed to fetch from DB, falling back to local:', err);
                orders = JSON.parse(localStorage.getItem('orders')) || [];
            }

            if (orders.length > 0) {
                ordersList.innerHTML = orders.map(order => `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <span class="order-id">${order.id}</span>
                                <p style="font-size: 0.85rem; color: #666;">Placed on ${order.date}</p>
                            </div>
                            <span class="order-status">${order.status}</span>
                        </div>
                        
                        <div class="order-details-grid">
                            <div class="detail-item">
                                <h4>Items</h4>
                                <p>${order.items.length} Product(s)</p>
                            </div>
                            <div class="detail-item">
                                <h4>Total Amount</h4>
                                <p>${order.total}</p>
                            </div>
                            <div class="detail-item">
                                <h4>Expected Delivery</h4>
                                <p style="color: var(--accent);">${order.deliveryDate}</p>
                            </div>
                            <div class="detail-item">
                                <h4>Ship To</h4>
                                <p>${order.address.name}</p>
                            </div>
                        </div>

                        <div class="tracking-timeline">
                            <h4>Tracking Progress</h4>
                            <div class="timeline-steps">
                                <div class="t-step completed">
                                    <div class="t-dot"><i data-lucide="check" size="16"></i></div>
                                    <span class="t-label">Confirmed</span>
                                </div>
                                <div class="t-step active">
                                    <div class="t-dot"><i data-lucide="package" size="16"></i></div>
                                    <span class="t-label">Processing</span>
                                </div>
                                <div class="t-step">
                                    <div class="t-dot"><i data-lucide="truck" size="16"></i></div>
                                    <span class="t-label">Shipped</span>
                                </div>
                                <div class="t-step">
                                    <div class="t-dot"><i data-lucide="home" size="16"></i></div>
                                    <span class="t-label">Delivered</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            }
        });
    </script>
</body>

</html>
